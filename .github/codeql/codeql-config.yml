name: "SwadKart CodeQL Config"

# Only scan production code — skip tests, builds, dependencies
paths-ignore:
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/coverage/**"
  - "**/*.test.js"
  - "**/*.test.jsx"
  - "**/*.spec.js"
  - "**/__tests__/**"
  - "**/__mocks__/**"

# Exclude queries that produce false positives for this React+Node codebase
query-filters:
  - exclude:
      id: js/xss-through-dom
  - exclude:
      id: js/clear-text-storage-of-sensitive-data
  - exclude:
      id: js/incomplete-url-substring-sanitization
