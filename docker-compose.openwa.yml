version: "3.9"

x-openwa-env: &openwa-env
  NODE_ENV=production
  TZ=Asia/Kolkata
  API_KEY=${OPENWA_API_KEY:?OPENWA_API_KEY is required}
  WEBHOOK_SECRET=${OPENWA_WEBHOOK_SECRET:-}
  ENGINE_TYPE=${OPENWA_ENGINE_TYPE:-baileys}
  ALLOWED_IPS=${OPENWA_ALLOWED_IPS:-}
  RATE_LIMIT_MAX=${OPENWA_RATE_LIMIT:-60}
  RATE_LIMIT_WINDOW_MS=60000

services:
  openwa-api:
    image: ghcr.io/rmyndharis/openwa:latest
    container_name: openwa-api
    restart: unless-stopped
    ports:
      - "${OPENWA_PORT:-2785}:2785"
    volumes:
      - openwa-data:/app/data
      - openwa-media:/app/media
    environment:
      <<: *openwa-env
      DB_TYPE=${OPENWA_DB_TYPE:-sqlite}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2785/api/sessions/stats/overview"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles: ["default", "postgres", "full"]

  openwa-db:
    image: postgres:16-alpine
    container_name: openwa-db
    restart: unless-stopped
    volumes:
      - openwa-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB=${OPENWA_PG_DB:-openwa}
      POSTGRES_USER=${OPENWA_PG_USER:-openwa}
      POSTGRES_PASSWORD=${OPENWA_PG_PASSWORD:?OPENWA_PG_PASSWORD is required}
    profiles: ["postgres", "full"]

  openwa-redis:
    image: redis:7-alpine
    container_name: openwa-redis
    restart: unless-stopped
    volumes:
      - openwa-redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    profiles: ["full"]

  openwa-minio:
    image: minio/minio:latest
    container_name: openwa-minio
    restart: unless-stopped
    volumes:
      - openwa-minio-data:/data
    environment:
      MINIO_ROOT_USER=${OPENWA_MINIO_USER:-openwa}
      MINIO_ROOT_PASSWORD=${OPENWA_MINIO_PASSWORD:?OPENWA_MINIO_PASSWORD is required}
    command: server /data --console-address ":9001"
    ports:
      - "${OPENWA_MINIO_PORT:-9000}:9000"
    profiles: ["full"]

volumes:
  openwa-data:
    name: openwa-data
  openwa-media:
    name: openwa-media
  openwa-pgdata:
    name: openwa-pgdata
  openwa-redis-data:
    name: openwa-redis-data
  openwa-minio-data:
    name: openwa-minio-data
