# OpenWA Deployment on Render
#
# This file documents the configuration for deploying OpenWA side-by-side with SwadKart.
# OpenWA is a separate service (repo: https://github.com/rmyndharis/OpenWA).
#
# ── Option A: Render Dashboard (Simplest) ──
# 1. Dashboard -> New -> Web Service
# 2. Paste: ghcr.io/rmyndharis/openwa:latest
# 3. Name: openwa-api, Port: 2785
# 4. Add env vars below
# 5. Deploy, then set Health Check Path: /api/sessions/stats/overview
#
# ── Option B: Render Blueprint (Fork OpenWA first) ──
# 1. Fork https://github.com/rmyndharis/OpenWA to your GitHub
# 2. Rename this file to render.yaml and put it in your FORK's root
# 3. Connect fork via Render Blueprints
#
# Environment Variables (set both in Option A & B):
# - API_KEY: generated by backend/scripts/generate-openwa-key.js
# - WEBHOOK_SECRET: generated by backend/scripts/generate-openwa-key.js
# - ENGINE_TYPE: baileys (more stable than whatsapp-web.js)

services:
  - type: web
    name: openwa-api
    env: docker
    dockerfilePath: ./Dockerfile
    repo: https://github.com/rmyndharis/OpenWA
    branch: main
    envVars:
      - key: API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: ENGINE_TYPE
        value: baileys
      - key: NODE_ENV
        value: production
      - key: ALLOWED_IPS
        value: ""
      - key: RATE_LIMIT_MAX
        value: 60
