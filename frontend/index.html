<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <link rel="icon" type="image/png" href="/pwa-192x192.png" />
  <title>SwadKart - Taste Delivered</title>
  <meta name="description"
    content="Order delicious food online from top restaurants in Jaipur. SwadKart offers fast delivery, real-time order tracking, and secure payments. Download our app today!" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="theme-color" content="#030712" />
  <meta name="background-color" content="#030712" />

  <meta name="mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SwadKart">
  <link rel="apple-touch-icon" href="/pwa-192x192.png">

  <link rel="manifest" href="/manifest.webmanifest">

  <!-- Preconnect to external CDNs for faster loading -->
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link rel="preconnect" href="https://checkout.razorpay.com" />

  <!-- Preload hero LCP image for faster First/Largest Contentful Paint -->
  <link rel="preload" as="image" type="image/webp" fetchpriority="high"
    href="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=800&q=70&fm=webp&auto=format&fit=crop" />

  <script defer src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <style>
    /* Mobile highlight remove and smooth scrolling */
    * {
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    body {
      background-color: #030712;
      margin: 0;
      overflow-x: hidden;
      overscroll-behavior-y: contain;
      /* Prevents pull-to-refresh pull-away */
    }
  </style>
</head>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
